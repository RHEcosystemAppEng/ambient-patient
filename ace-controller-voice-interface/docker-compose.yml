name: voice-agents-webrtc

services:
  riva-asr-parakeet:
    image: nvcr.io/nim/nvidia/parakeet-1-1b-ctc-en-us:1.3.0
    user: "0:0"
    env_file:
      - path: ./ace_controller.env
        required: true
    environment:
      - NIM_HTTP_API_PORT=9001
      - NIM_GRPC_API_PORT=50052
      - NIM_TAGS_SELECTOR=mode=str,vad=silero
    ports:
      - "19001:9001"
      - "50152:50052"
    volumes:
      - nim_cache:/opt/nim/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/bin/grpc_health_probe -addr=:50052 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${RIVA_ASR_NIM_GPU_ID:-6}']
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    profiles:
      - riva-nims-local
    networks:
      - ui-network
    
  riva-tts-magpie:
    image: nvcr.io/nim/nvidia/magpie-tts-multilingual:1.3.0
    user: "0:0"
    env_file: 
      - path: ./ace_controller.env
        required: true
    environment:
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
    ports:
      - "19000:9000"
      - "50151:50051"
    healthcheck:
      test: ["CMD-SHELL", "/bin/grpc_health_probe -addr=:50051 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 150s
    volumes:
      - nim_cache:/opt/nim/.cache
      - riva_data:/data
    shm_size: 16GB
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${RIVA_TTS_NIM_GPU_ID:-6}']
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    profiles:
      - riva-nims-local
    networks:
      - ui-network
       
  python-app:
    build:
      context: ./
      dockerfile: Dockerfile-python-app
    ports:
      - "7860:7860"
    volumes:
      - ./audio_dumps:/ace-controller/examples/healthcare_agent/audio_dumps
    env_file:
      - path: ./ace_controller.env
        required: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7860/get_prompt || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    profiles:
      - ace-controller
    networks:
      - ui-network
    

  ui-app:
    build:
      context: ./
      dockerfile: Dockerfile-webrtc-ui
    ports:
      - "4400:4400"
    depends_on:
      python-app:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - ace-controller
    networks:
      - ui-network

# the default network under the dir agent/ was created 
# when we brought up the agent backend app server
networks:
  ui-network:
    name: healthcare-agent
    external: true

volumes:
  nim_cache:
  riva_data:

