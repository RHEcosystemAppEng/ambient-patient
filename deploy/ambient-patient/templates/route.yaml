{{- if .Values.route.fullAgentUi.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "ambient-patient.fullname" . }}-full-agent-ui
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambient-patient.labels" . | nindent 4 }}
    app.kubernetes.io/component: full-agent-ui
spec:
  {{- if .Values.route.fullAgentUi.host }}
  host: {{ .Values.route.fullAgentUi.host }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "ambient-patient.fullname" . }}-full-agent-ui
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
