apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ambient-patient.fullname" . }}-app-server-env
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambient-patient.labels" . | nindent 4 }}
    app.kubernetes.io/component: app-server
type: Opaque
stringData:
  NVIDIA_API_KEY: {{ .Values.appServer.nvidiaApiKey | quote }}
  NGC_API_KEY: {{ .Values.appServer.ngcApiKey | quote }}
  TAVILY_API_KEY: {{ .Values.appServer.tavilyApiKey | quote }}
  LANGSMITH_API_KEY: {{ .Values.appServer.langsmithApiKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ambient-patient.fullname" . }}-ace-controller-env
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ambient-patient.labels" . | nindent 4 }}
    app.kubernetes.io/component: ace-controller-pipeline
type: Opaque
stringData:
  NGC_API_KEY: {{ .Values.aceControllerPipeline.ngcApiKey | quote }}
  NVIDIA_API_KEY: {{ .Values.aceControllerPipeline.nvidiaApiKey | quote }}
  CONFIG_PATH: {{ .Values.aceControllerPipeline.configPath | quote }}
  REQUEST_TIMEOUT: {{ .Values.aceControllerPipeline.requestTimeout | quote }}
  TURN_SERVER_URL: {{ .Values.aceControllerPipeline.turnServerUrl | quote }}
  TURN_USERNAME: {{ .Values.aceControllerPipeline.turnUsername | quote }}
  TURN_PASSWORD: {{ .Values.aceControllerPipeline.turnPassword | quote }}
  METERED_TURN_API_KEY: {{ .Values.aceControllerPipeline.meteredTurnApiKey | quote }}
  METERED_CREDENTIALS_URL: {{ .Values.aceControllerPipeline.meteredCredentialsUrl | quote }}
  {{- if .Values.aceControllerPipeline.ragServerUrl }}
  RAG_SERVER_URL: {{ .Values.aceControllerPipeline.ragServerUrl | quote }}
  {{- else }}
  RAG_SERVER_URL: {{ printf "http://%s-app-server:%d" (include "ambient-patient.fullname" .) (int .Values.service.appServer.port) | quote }}
  {{- end }}
